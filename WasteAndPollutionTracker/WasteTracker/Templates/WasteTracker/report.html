<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste & Pollution Management Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Replace the URL below with your preferred environmental background image */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            margin: 2rem auto;
        }
         .btn-clear {
            background-color: #6c757d;
            color: white;
        }

        .btn-clear:hover {
            background-color: #5a6268;
            color: white;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="text-center mb-4 text-success">Pollution Report Portal</h2>
        <p class="text-muted text-center">Please provide details regarding the waste or pollution incident.</p>
        <hr>

        <form>
              <div class="userNamePhone">
                <!-- username input -->
                <div>
                    <label for="userName" class="form-label fw-bold">Name:</label><br />
                    <input type="text" name="userName" placeholder="eg.Joe Doek" required />
                </div>
                <!-- userphone number -->
                <div>
                    <label for="userPhone" class="form-label fw-bold">Phone Number:</label><br />
                    <input type="number" name="userPhone" placeholder="eg.+254712345678" required />
                </div>
            </div>
            <div class="pollutionTypeDate">
                  <!-- date -->
                <div>
                    <label for="Date" class="form-label fw-bold">Date:</label><br />
                    <input type="date" name="Date" required/>
                </div>
                <!-- pollutionType -->
                  <div class="mb-3">
                <label for="pollutionType" class="form-label fw-bold">Type of Pollution:</label>
                <select class="form-select" id="pollutionType" required>
                    <option value="" selected disabled>Choose an option...</option>
                    <option value="water">Water Pollution</option>
                    <option value="air">Air Quality/Emission</option>
                    <option value="solid-waste">Illegal Waste Dumping</option>
                    <option value="noise">Noise Pollution</option>
                    <option value="hazardous">Hazardous Chemicals</option>
                </select>
            </div>
            </div>

            <div class="mb-4">
                <label for="description" class="form-label fw-bold">Detailed Description</label>
                <textarea class="form-control" id="description" rows="4" placeholder="Describe the severity and impact..." required></textarea>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="reset" class="btn btn-clear px-4 ">Clear Form</button>
                <button type="submit" class="btn btn-success px-5 me-md-2">Submit Report</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
